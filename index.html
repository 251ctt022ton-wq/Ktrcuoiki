<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trắc Nghiệm Kinh Tế Chính Trị - 25 Câu Ngẫu Nhiên</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #3498db;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-color: #333333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 5px;
        }

        .subtitle {
            text-align: center;
            color: #7f8c8d;
            margin-bottom: 30px;
            font-style: italic;
        }

        .loading {
            text-align: center;
            font-size: 1.2rem;
            color: #7f8c8d;
        }

        .quiz-item {
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px solid #e2e8f0;
        }

        .question {
            font-weight: 600;
            font-size: 1.1rem;
            margin-bottom: 12px;
            color: var(--primary-color);
        }

        .options-list {
            list-style-type: none;
            padding: 0;
            margin: 0;
        }

        .option-item {
            margin-bottom: 8px;
        }

        label {
            display: flex;
            align-items: center;
            padding: 10px 15px;
            background: #f1f5f9;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        label:hover {
            background: #e2e8f0;
        }

        input[type="radio"] {
            margin-right: 12px;
            transform: scale(1.2);
        }

        .result-box {
            display: none;
            background: #d1e7dd;
            color: #0f5132;
            padding: 20px;
            border-radius: 6px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 1.3rem;
            font-weight: bold;
        }

        .btn-group {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        button {
            flex: 1;
            padding: 15px;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        #submit-btn {
            background: var(--secondary-color);
        }

        #submit-btn:hover {
            background: #2980b9;
        }

        #reload-btn {
            background: #e67e22;
        }

        #reload-btn:hover {
            background: #d35400;
        }

        .correct {
            background-color: #d1e7dd !important;
            border-color: #a3cfbb !important;
            color: #0f5132;
        }

        .incorrect {
            background-color: #f8d7da !important;
            border-color: #f5c2c7 !important;
            color: #842029;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Bài Tập Trắc Nghiệm Kinh Tế Chính Trị</h1>
    <div class="subtitle">(Hệ thống tự động lấy ngẫu nhiên 25 câu hỏi từ ngân hàng đề)</div>
    
    <div id="result" class="result-box"></div>
    <div id="quiz-container" class="loading">Đang trộn đề và tải dữ liệu câu hỏi...</div>
    
    <div class="btn-group">
        <button id="submit-btn" style="display: none;" onclick="chamDiem()">Nộp Bài / Xem Kết Quả</button>
        <button id="reload-btn" style="display: none;" onclick="window.location.reload()">Đổi Đề Khác</button>
    </div>
</div>

<script>
    let activeQuestions = [];
    // Tên file JSON chứa ngân hàng đề nằm cùng thư mục
    const jsonUrl = './200_cau_hoi_kinh_te_chin_tri.json'; 

    // Thuật toán đảo vị trí phần tử ngẫu nhiên Fisher-Yates
    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    // Tải dữ liệu JSON và trích xuất 25 câu hỏi ngẫu nhiên
    async function loadQuestions() {
        const container = document.getElementById('quiz-container');
        try {
            const response = await fetch(jsonUrl);
            if (!response.ok) throw new Error('Không thể tải tệp dữ liệu JSON');
            
            const allQuestions = await response.json();
            
            // Trộn ngẫu nhiên toàn bộ mảng dữ liệu gốc
            const shuffled = shuffleArray(allQuestions);
            
            // Cắt lấy chuẩn xác 25 câu đầu tiên của mảng sau khi trộn
            activeQuestions = shuffled.slice(0, 25);
            
            // Dọn dẹp dòng chữ loading ban đầu
            container.innerHTML = '';
            
            // Đổ dữ liệu 25 câu ra màn hình giao diện
            activeQuestions.forEach((item, index) => {
                const quizItem = document.createElement('div');
                quizItem.className = 'quiz-item';
                quizItem.id = `question-box-${index}`;

                const labelAlpha = ['A', 'B', 'C', 'D'];
                let optionsHtml = '';
                
                item.options.forEach((opt, optIdx) => {
                    optionsHtml += `
                        <li class="option-item">
                            <label id="label-${index}-${optIdx}">
                                <input type="radio" name="question-${index}" value="${optIdx}">
                                <span><strong>${labelAlpha[optIdx]}.</strong> ${opt}</span>
                            </label>
                        </li>
                    `;
                });

                // Hiển thị STT từ 1-25 và giữ lại ID gốc ở cạnh để người dùng đối chiếu đáp án nếu cần
                quizItem.innerHTML = `
                    <div class="question">Câu ${index + 1}: ${item.question} <small style="color:#95a5a6; font-weight:normal;">(Gốc: Câu ${item.id})</small></div>
                    <ul class="options-list">${optionsHtml}</ul>
                `;
                container.appendChild(quizItem);
            });

            // Kích hoạt hiển thị các nút thao tác làm bài
            document.getElementById('submit-btn').style.display = 'block';
            document.getElementById('reload-btn').style.display = 'block';

        } catch (error) {
            console.error(error);
            container.innerHTML = `<div style="color:red; text-align:center;">Lỗi: Không thể lấy dữ liệu câu hỏi. Hãy chắc chắn tên tệp JSON của bạn là chuẩn xác!</div>`;
        }
    }

    // Xử lý tính điểm trực tiếp và hiện màu đáp án đúng/sai
    function chamDiem() {
        let score = 0;
        const total = activeQuestions.length;

        activeQuestions.forEach((item, index) => {
            const selectedInput = document.querySelector(`input[name="question-${index}"]:checked`);
            
            // Ánh xạ đáp án chữ cái từ JSON (A, B, C, D) sang chỉ số mảng (0, 1, 2, 3)
            const mapAlpha = {'A': 0, 'B': 1, 'C': 2, 'D': 3};
            const correctIndex = mapAlpha[item.answer_index.toUpperCase().trim()];

            // Reset màu nền các đáp án lựa chọn trước đó
            item.options.forEach((_, optIdx) => {
                document.getElementById(`label-${index}-${optIdx}`).className = '';
            });

            // Đánh dấu màu xanh cho phương án chuẩn của hệ thống
            document.getElementById(`label-${index}-${correctIndex}`).classList.add('correct');

            if (selectedInput) {
                const userAnswerIndex = parseInt(selectedInput.value);
                if (userAnswerIndex === correctIndex) {
                    score++; // Thêm điểm nếu câu trả lời đúng
                } else {
                    // Đánh dấu màu đỏ cho lựa chọn bị chọn sai của người dùng
                    document.getElementById(`label-${index}-${userAnswerIndex}`).classList.add('incorrect');
                }
            }
        });

        // Đổ điểm số thống kê ra bảng thông báo kết quả
        const resultBox = document.getElementById('result');
        resultBox.style.display = 'block';
        resultBox.innerHTML = `Kết quả của bạn: ${score} / ${total} câu đúng (${((score/total)*100).toFixed(2)}%)`;
        
        // Tự động cuộn trang mượt mà lên đầu để xem ngay kết quả điểm số
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // Chạy kích hoạt ứng dụng ngay khi cấu trúc DOM của trang tải thành công
    document.addEventListener('DOMContentLoaded', loadQuestions);
</script>

</body>
</html>
