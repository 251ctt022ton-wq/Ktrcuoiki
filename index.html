<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trắc Nghiệm Kinh Tế Chính Trị</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #3498db;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-color: #333333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 30px;
        }

        .loading {
            text-align: center;
            font-size: 1.2rem;
            color: #7f8c8d;
        }

        .quiz-item {
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px solid #e2e8f0;
        }

        .question {
            font-weight: 600;
            font-size: 1.1rem;
            margin-bottom: 12px;
            color: var(--primary-color);
        }

        .options-list {
            list-style-type: none;
            padding: 0;
            margin: 0;
        }

        .option-item {
            margin-bottom: 8px;
        }

        label {
            display: flex;
            align-items: center;
            padding: 10px 15px;
            background: #f1f5f9;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        label:hover {
            background: #e2e8f0;
        }

        input[type="radio"] {
            margin-right: 12px;
            transform: scale(1.2);
        }

        /* Thống kê kết quả */
        .result-box {
            display: none;
            background: #d1e7dd;
            color: #0f5132;
            padding: 20px;
            border-radius: 6px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 1.3rem;
            font-weight: bold;
        }

        button {
            display: block;
            width: 100%;
            padding: 15px;
            background: var(--secondary-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background: #2980b9;
        }

        /* Trạng thái đáp án đúng/sai sau khi nộp bài */
        .correct {
            background-color: #d1e7dd !important;
            border-color: #a3cfbb !important;
            color: #0f5132;
        }

        .incorrect {
            background-color: #f8d7da !important;
            border-color: #f5c2c7 !important;
            color: #842029;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Bài Tập Trắc Nghiệm Kinh Tế Chính Trị</h1>
    <div id="result" class="result-box"></div>
    <div id="quiz-container" class="loading">Đang tải câu hỏi từ hệ thống...</div>
    <button id="submit-btn" style="display: none;" onclick="chamDiem()">Nộp Bài / Xem Kết Quả</button>
</div>

<script>
    let dataQuestions = [];
    // Đường dẫn trỏ tới file json nằm cùng thư mục trên GitHub
    const jsonUrl = './200_cau_hoi_kinh_te_chinh_tri.json'; 

    // Hàm tự động fetch dữ liệu khi mở trang web
    async function loadQuestions() {
        const container = document.getElementById('quiz-container');
        try {
            const response = await fetch(jsonUrl);
            if (!response.ok) {
                throw new Error('Không thể tải tệp dữ liệu JSON');
            }
            dataQuestions = await response.json();
            
            // Xóa dòng thông báo Đang tải...
            container.innerHTML = '';
            
            // Render từng câu hỏi ra giao diện
            dataQuestions.forEach((item, index) => {
                const quizItem = document.createElement('div');
                quizItem.className = 'quiz-item';
                quizItem.id = `question-box-${index}`;

                // Mảng ký tự nhận diện phương án đầu dòng
                const labelAlpha = ['A', 'B', 'C', 'D'];

                let optionsHtml = '';
                item.options.forEach((opt, optIdx) => {
                    optionsHtml += `
                        <li class="option-item">
                            <label id="label-${index}-${optIdx}">
                                <input type="radio" name="question-${index}" value="${optIdx}">
                                <span><strong>${labelAlpha[optIdx]}.</strong> ${opt}</span>
                            </label>
                        </li>
                    `;
                });

                quizItem.innerHTML = `
                    <div class="question">Câu ${item.id}: ${item.question}</div>
                    <ul class="options-list">${optionsHtml}</ul>
                `;
                container.appendChild(quizItem);
            });

            // Hiện nút nộp bài
            document.getElementById('submit-btn').style.display = 'block';

        } catch (error) {
            console.error(error);
            container.innerHTML = `<div style="color:red; text-align:center;">Lỗi: Không thể nạp danh sách câu hỏi. Hãy chắc chắn tên file JSON của bạn chính xác!</div>`;
        }
    }

    // Hàm tính điểm và hiển thị đáp án đúng/sai
    function chamDiem() {
        let score = 0;
        const total = dataQuestions.length;

        dataQuestions.forEach((item, index) => {
            const selectedInput = document.querySelector(`input[name="question-${index}"]:checked`);
            
            // Tìm vị trí của đáp án đúng trong mảng options
            // Chuyển ký tự (A, B, C, D) từ 'answer_index' thành chỉ số số (0, 1, 2, 3)
            const mapAlpha = {'A': 0, 'B': 1, 'C': 2, 'D': 3};
            const correctIndex = mapAlpha[item.answer_index.toUpperCase().trim()];

            // Reset màu toàn bộ các nhãn của câu này trước khi chấm lại
            item.options.forEach((_, optIdx) => {
                document.getElementById(`label-${index}-${optIdx}`).className = '';
            });

            // Tô màu xanh lá cây đậm cho đáp án đúng chuẩn của hệ thống
            document.getElementById(`label-${index}-${correctIndex}`).classList.add('correct');

            if (selectedInput) {
                const userAnswerIndex = parseInt(selectedInput.value);
                if (userAnswerIndex === correctIndex) {
                    score++;
                } else {
                    // Nếu làm sai, tô màu đỏ nhãn người dùng đã chọn
                    document.getElementById(`label-${index}-${userAnswerIndex}`).classList.add('incorrect');
                }
            }
        });

        // Hiển thị khung kết quả lên đầu trang
        const resultBox = document.getElementById('result');
        resultBox.style.display = 'block';
        resultBox.innerHTML = `Kết quả của bạn: ${score} / ${total} câu đúng (${((score/total)*100).toFixed(2)}%)`;
        
        // Cuộn màn hình mượt mà lên vị trí kết quả quả
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // Chạy tải dữ liệu ngay khi tải xong trang cấu trúc DOM
    document.addEventListener('DOMContentLoaded', loadQuestions);
</script>

</body>
</html>
